<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabelog Writer</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #30251f;
        background: #f8f4ef;
      }
      * { box-sizing: border-box; }
      body { margin: 0; }
      main { width: min(100% - 32px, 720px); margin: 0 auto; padding: 56px 0 80px; }
      header { margin-bottom: 32px; }
      .eyebrow { margin: 0 0 8px; color: #a54b20; font-size: 13px; font-weight: 700; letter-spacing: .12em; }
      h1 { margin: 0; font-size: clamp(30px, 6vw, 44px); line-height: 1.15; }
      .lead { margin: 12px 0 0; color: #695c54; line-height: 1.75; }
      .card { padding: clamp(22px, 5vw, 36px); border: 1px solid #e5d9cf; border-radius: 20px; background: #fff; box-shadow: 0 14px 40px rgba(74, 50, 34, .07); }
      form { display: grid; gap: 22px; }
      label { display: grid; gap: 8px; font-weight: 700; }
      .optional { color: #8b7c72; font-size: 13px; font-weight: 400; }
      input, textarea { width: 100%; border: 1px solid #cfc2b8; border-radius: 10px; padding: 12px 14px; color: inherit; background: #fffdfb; font: inherit; line-height: 1.6; }
      input:focus, textarea:focus { border-color: #b35428; outline: 3px solid rgba(179, 84, 40, .14); }
      textarea { min-height: 128px; resize: vertical; }
      button { min-height: 48px; border: 0; border-radius: 10px; padding: 12px 18px; background: #a94f25; color: #fff; font: inherit; font-weight: 700; cursor: pointer; }
      button:hover { background: #8f3f1b; }
      button:disabled { cursor: wait; opacity: .55; }
      #status { min-height: 24px; margin: 4px 0 0; color: #695c54; line-height: 1.6; }
      #status.error { color: #b42318; }
      #result { margin-top: 24px; }
      #result h2 { margin: 0 0 18px; font-size: 22px; }
      #generatedTitle { margin: 0 0 16px; font-size: 19px; font-weight: 700; }
      #generatedBody { margin: 0; white-space: pre-wrap; line-height: 1.85; }
      .result-footer { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-top: 24px; padding-top: 20px; border-top: 1px solid #eee5de; }
      .notice { margin: 0; color: #796b62; font-size: 13px; line-height: 1.55; }
      .copy { flex: none; min-height: 42px; background: #3d332d; }
      .copy:hover { background: #211b18; }
      [hidden] { display: none !important; }
      @media (max-width: 520px) {
        main { padding-top: 36px; }
        .result-footer { align-items: stretch; flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="eyebrow">PERSONAL REVIEW WRITER</p>
        <h1>自分らしい口コミを、下書きに。</h1>
        <p class="lead">今回の食事について入力すると、過去の口コミの文体を参考にタイトルと本文を生成します。</p>
      </header>

      <section class="card" aria-labelledby="form-title">
        <h2 id="form-title" hidden>口コミ入力フォーム</h2>
        <form id="reviewForm">
          <label>
            店名
            <input name="restaurantName" required maxlength="100" autocomplete="organization" placeholder="例：〇〇食堂" />
          </label>
          <label>
            注文内容・体験
            <textarea name="experience" required maxlength="3000" placeholder="食べた料理、味、価格、店内の様子など、事実を自由に入力"></textarea>
          </label>
          <label>
            評価
            <input name="rating" type="number" required min="0" max="5" step="0.1" inputmode="decimal" placeholder="4.0" />
          </label>
          <label>
            日記・個人的エピソード <span class="optional">任意</span>
            <textarea name="personalEpisode" maxlength="2000" placeholder="誰と行ったか、その日にあったことなど"></textarea>
          </label>
          <button id="submitButton" type="submit">口コミを生成する</button>
          <p id="status" role="status" aria-live="polite"></p>
        </form>
      </section>

      <section id="result" class="card" aria-labelledby="result-title" hidden>
        <h2 id="result-title">生成した下書き</h2>
        <p id="generatedTitle"></p>
        <p id="generatedBody"></p>
        <div class="result-footer">
          <p id="notice" class="notice"></p>
          <button id="copyButton" class="copy" type="button">コピー</button>
        </div>
      </section>
    </main>

    <script>
      const form = document.querySelector("#reviewForm");
      const submitButton = document.querySelector("#submitButton");
      const status = document.querySelector("#status");
      const result = document.querySelector("#result");
      const generatedTitle = document.querySelector("#generatedTitle");
      const generatedBody = document.querySelector("#generatedBody");
      const notice = document.querySelector("#notice");
      const copyButton = document.querySelector("#copyButton");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitButton.disabled = true;
        submitButton.textContent = "生成中…";
        status.textContent = "口コミを生成しています。";
        status.classList.remove("error");
        result.hidden = true;

        const data = new FormData(form);
        const payload = {
          restaurantName: data.get("restaurantName"),
          experience: data.get("experience"),
          rating: Number(data.get("rating")),
          personalEpisode: data.get("personalEpisode"),
        };

        try {
          const response = await fetch("/api/generate", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });
          const body = await response.json();
          if (!response.ok) throw new Error(body.error || "生成に失敗しました。");

          generatedTitle.textContent = body.title;
          generatedBody.textContent = body.body;
          notice.textContent = body.notice;
          result.hidden = false;
          status.textContent = "下書きを生成しました。";
          result.scrollIntoView({ behavior: "smooth", block: "start" });
        } catch (error) {
          status.textContent = error instanceof Error ? error.message : "生成に失敗しました。";
          status.classList.add("error");
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "口コミを生成する";
        }
      });

      copyButton.addEventListener("click", async () => {
        await navigator.clipboard.writeText(`${generatedTitle.textContent}\n\n${generatedBody.textContent}`);
        copyButton.textContent = "コピーしました";
        setTimeout(() => { copyButton.textContent = "コピー"; }, 1600);
      });
    </script>
  </body>
</html>
